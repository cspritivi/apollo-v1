# ============================================================================
# ORDERS — CART REMOVE ITEM
#
# Tests removing an item from the cart and verifying the empty state appears.
#
# WHY THIS TEST EXISTS:
# The cart's remove functionality is the only way to "undo" adding an item
# (there's no edit). If remove breaks, customers are stuck with unwanted
# items in their cart. The empty state is also important — it guides the
# customer back to browsing with a "Browse Products" button.
#
# FLOW:
# Login → Products → configure Two-Piece Suit → "Add to Cart"
# → Cart tab → verify item present → remove item → verify empty state
# → verify "Browse Products" link works → cleanup (logout)
#
# PREREQUISITE:
# - Test user exists in Supabase Auth (cspritivi@gmail.com / test123456)
# - Seed data loaded (products + product_options + fabrics)
# ============================================================================
appId: host.exp.Exponent

---

# ---- AUTHENTICATE ----
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 10000

# ---- CONFIGURE AND ADD TO CART ----
- tapOn: "Products"

- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

- tapOn:
    text: "Two-Piece Suit.*"

# Step 0: Fabric
- extendedWaitUntil:
    visible:
      text: "Choose Fabric"
    timeout: 10000

- tapOn:
    text: "Black Wool Crepe.*"

- tapOn: "Next"

# Step 1: Lapel Style
- extendedWaitUntil:
    visible:
      text: "Choose Lapel Style"
    timeout: 5000

- tapOn:
    text: "Peak Lapel.*"

- tapOn: "Next"

# Step 2: Button Count
- extendedWaitUntil:
    visible:
      text: "Choose Button Count"
    timeout: 5000

- tapOn:
    text: "Two Button.*"

- tapOn: "Next"

# Step 3: Vent Style
- extendedWaitUntil:
    visible:
      text: "Choose Vent Style"
    timeout: 5000

- tapOn:
    text: "Single Vent.*"

- tapOn: "Next"

# Step 4: Lining Style
- extendedWaitUntil:
    visible:
      text: "Choose Lining Style"
    timeout: 5000

- tapOn:
    text: "Full Lining.*"

- tapOn: "Next"

# Step 5: Pocket Style
- extendedWaitUntil:
    visible:
      text: "Choose Pocket Style"
    timeout: 5000

- tapOn:
    text: "Welt Pocket.*"

- tapOn: "Next"

# Review → Add to Cart
- extendedWaitUntil:
    visible:
      text: "Review Your Configuration"
    timeout: 5000

- tapOn: "Add to cart"

# Back on Products tab
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

# ---- GO TO CART ----
- tapOn: "Cart"

# Verify item is in the cart
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit"
    timeout: 5000

- assertVisible: "Black Wool Crepe"

# ---- REMOVE THE ITEM ----
# The remove button has accessibilityLabel "Remove Two-Piece Suit from cart"
- tapOn: "Remove Two-Piece Suit from cart"

# ---- VERIFY EMPTY STATE ----
- extendedWaitUntil:
    visible:
      text: "Your cart is empty"
    timeout: 5000

- assertVisible: "Configure a product and add it to your cart"

# Verify "Browse Products" button exists and works
- tapOn: "Browse Products"

# Should navigate to Products tab
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

# ---- CLEANUP ----
- tapOn: "Home"
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
