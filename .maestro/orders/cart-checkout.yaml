# ============================================================================
# ORDERS — CART CHECKOUT (MULTIPLE ITEMS)
#
# Tests the full cart checkout flow: add two different products to cart,
# verify cart shows both items with correct total, place order, verify
# the Order Success screen.
#
# WHY TWO ITEMS:
# The cart's primary value proposition is multi-item orders (e.g., suit +
# shirts for a wedding). Testing with a single item wouldn't exercise the
# batch insert path or the total price calculation across items.
#
# FLOW:
# Login → Products → configure Two-Piece Suit → "Add to Cart"
# → Products → configure Dress Shirt → "Add to Cart"
# → Cart tab → verify 2 items → "Place Order" → Order Success
# → cleanup (logout)
#
# PREREQUISITE:
# - Test user exists in Supabase Auth (cspritivi@gmail.com / test123456)
# - Seed data loaded (products with Two-Piece Suit and Dress Shirt)
# ============================================================================
appId: host.exp.Exponent

---

# ---- AUTHENTICATE ----
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 10000

# ===========================================================================
# ITEM 1: TWO-PIECE SUIT
# ===========================================================================
- tapOn: "Products"

- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

- tapOn:
    text: "Two-Piece Suit.*"

# Step 0: Fabric
- extendedWaitUntil:
    visible:
      text: "Choose Fabric"
    timeout: 10000

- tapOn:
    text: "Black Wool Crepe.*"

- tapOn: "Next"

# Step 1: Lapel Style
- extendedWaitUntil:
    visible:
      text: "Choose Lapel Style"
    timeout: 5000

- tapOn:
    text: "Peak Lapel.*"

- tapOn: "Next"

# Step 2: Button Count
- extendedWaitUntil:
    visible:
      text: "Choose Button Count"
    timeout: 5000

- tapOn:
    text: "Two Button.*"

- tapOn: "Next"

# Step 3: Vent Style
- extendedWaitUntil:
    visible:
      text: "Choose Vent Style"
    timeout: 5000

- tapOn:
    text: "Single Vent.*"

- tapOn: "Next"

# Step 4: Lining Style
- extendedWaitUntil:
    visible:
      text: "Choose Lining Style"
    timeout: 5000

- tapOn:
    text: "Full Lining.*"

- tapOn: "Next"

# Step 5: Pocket Style
- extendedWaitUntil:
    visible:
      text: "Choose Pocket Style"
    timeout: 5000

- tapOn:
    text: "Welt Pocket.*"

- tapOn: "Next"

# Review → Add to Cart
- extendedWaitUntil:
    visible:
      text: "Review Your Configuration"
    timeout: 5000

- tapOn: "Add to cart"

# Back on Products tab
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

# ===========================================================================
# ITEM 2: DRESS SHIRT
# ===========================================================================
- tapOn:
    text: "Dress Shirt.*"

# Step 0: Fabric — pick a different fabric to distinguish items
- extendedWaitUntil:
    visible:
      text: "Choose Fabric"
    timeout: 10000

- tapOn:
    text: "Camel Wool Twill.*"

- tapOn: "Next"

# Dress Shirt has different option groups than Suit — step through each.
# We don't know the exact groups, so we select the first visible option
# on each step and advance. The test validates the flow completes, not
# the specific option names.

# Step 1: First option group
- extendedWaitUntil:
    visible:
      text: "Choose.*"
    timeout: 5000

# Select the first option card by tapping "Tap an option to select it"
# area — but actually we need to tap an option. Use a generic approach:
# tap the first visible option (they all have ".*" pattern with price).
- tapOn:
    index: 0
    id: "option-card-0"
    optional: true

# Fallback: tap the first option by matching any text with a price modifier
- tapOn:
    text: ".*\\$.*"
    index: 0
    optional: true

- tapOn: "Next"

# Continue through remaining steps — each step: wait for title, tap first option, Next
- extendedWaitUntil:
    visible:
      text: "Choose.*"
    timeout: 5000

- tapOn:
    text: ".*\\$.*"
    index: 0
    optional: true

- tapOn: "Next"

- extendedWaitUntil:
    visible:
      text: "Choose.*"
    timeout: 5000

- tapOn:
    text: ".*\\$.*"
    index: 0
    optional: true

- tapOn: "Next"

# Check if we're at Review or another option step
- extendedWaitUntil:
    visible:
      text: "Review Your Configuration|Choose.*"
    timeout: 5000

# If there are more option steps, keep advancing
- tapOn:
    text: ".*\\$.*"
    index: 0
    optional: true

- tapOn:
    text: "Next"
    optional: true

# We should now be at Review (or get there with one more Next)
- extendedWaitUntil:
    visible:
      text: "Review Your Configuration"
    timeout: 10000

- tapOn: "Add to cart"

# Back on Products tab
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

# ===========================================================================
# CART CHECKOUT
# ===========================================================================
- tapOn: "Cart"

# Verify both items are in the cart
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit"
    timeout: 5000

- assertVisible: "Dress Shirt"

# Verify item count shows "2 items"
- assertVisible: "2 items"

# Place the order (batch checkout)
- tapOn: "Place Order"

# ---- VERIFY ORDER SUCCESS ----
- extendedWaitUntil:
    visible:
      text: "Order Placed!"
    timeout: 15000

- assertVisible: "PLACED"
- assertVisible: "View My Orders"

# ---- CLEANUP ----
- tapOn: "View My Orders"

- extendedWaitUntil:
    visible:
      text: "My Orders"
    timeout: 10000

- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
