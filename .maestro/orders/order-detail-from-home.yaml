# ============================================================================
# ORDERS — ORDER DETAIL FROM PROFILE SCREEN
#
# Tests navigating to the order detail screen by tapping an order row on the
# Profile screen's "My Orders" section. Verifies the detail screen shows product
# name, fabric name, status badge, timeline, chosen options, and price.
#
# WHY THIS TEST EXISTS:
# The order detail screen is the customer's primary way to see full order
# information and track status. This test verifies the full path from placing
# an order to viewing its details — the core order tracking user journey.
#
# FLOW:
# Login → Products → configure Two-Piece Suit → "Place Order Now"
# → confirm dialog → Order Success → "View My Orders"
# → Profile screen → tap order row → verify Order Detail screen
# → tap back → verify Profile screen → cleanup (logout)
#
# PREREQUISITE:
# - Test user exists in Supabase Auth (cspritivi@gmail.com / test123456)
# - Seed data loaded (products + product_options + fabrics)
# - SQL migrations run (fabric_meters, nullable measurement_snapshot)
# ============================================================================
appId: com.apollo.tailor

---

# ---- AUTHENTICATE ----
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true


# ---- CONFIGURE AND PLACE ORDER (EXPRESS CHECKOUT) ----
- tapOn: "Products"

- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

- tapOn:
    text: "Two-Piece Suit.*"

# Step 0: Fabric
- extendedWaitUntil:
    visible:
      text: "Choose Fabric"
    timeout: 10000

- tapOn:
    text: "Black Wool Crepe.*"

- tapOn: "Next"

# Step 1: Lapel Style
- extendedWaitUntil:
    visible:
      text: "Choose Lapel Style"
    timeout: 5000

- tapOn:
    text: "Peak Lapel.*"

- tapOn: "Next"

# Step 2: Button Count
- extendedWaitUntil:
    visible:
      text: "Choose Button Count"
    timeout: 5000

- tapOn:
    text: "Two Button.*"

- tapOn: "Next"

# Step 3: Vent Style
- extendedWaitUntil:
    visible:
      text: "Choose Vent Style"
    timeout: 5000

- tapOn:
    text: "Single Vent.*"

- tapOn: "Next"

# Step 4: Lining Style
- extendedWaitUntil:
    visible:
      text: "Choose Lining Style"
    timeout: 5000

- tapOn:
    text: "Full Lining.*"

- tapOn: "Next"

# Step 5: Pocket Style
- extendedWaitUntil:
    visible:
      text: "Choose Pocket Style"
    timeout: 5000

- tapOn:
    text: "Welt Pocket.*"

- tapOn: "Next"

# Review → Express Checkout
- extendedWaitUntil:
    visible:
      text: "Review Your Configuration"
    timeout: 5000

- scrollUntilVisible:
    element:
      text: "Place Order Now"
    direction: DOWN
    timeout: 5000

- tapOn: "Place order now"

# Confirm the Alert dialog
- extendedWaitUntil:
    visible:
      text: "Place Order"
    timeout: 5000

- tapOn:
    text: "Place Order"
    index: 1

# ---- ORDER SUCCESS ----
- extendedWaitUntil:
    visible:
      text: "Order Placed!"
    timeout: 15000

# Navigate to Home via "View My Orders"
- tapOn: "View My Orders"

# ---- TAP ORDER ROW TO OPEN DETAIL ----
- extendedWaitUntil:
    visible:
      text: "My Orders"
    timeout: 10000

# Tap the first order row — OrderRow has testID="order-row" when onPress is provided
- tapOn:
    id: "order-row"

# ---- VERIFY ORDER DETAIL SCREEN ----
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit"
    timeout: 10000

# Verify product and fabric names from the joined query
- assertVisible: "Two-Piece Suit"
- assertVisible: "Black Wool Crepe"

# Verify status badge shows "Placed"
- assertVisible: "Placed"

# Verify the timeline section exists
- assertVisible: "Order Timeline"

# Verify the details section exists
- assertVisible: "Order Details"

# Verify at least one chosen option is visible (Peak Lapel from lapel_style)
- assertVisible: "Peak Lapel"

# Verify price is displayed (dollar format)
- assertVisible:
    text: "\\$.*"

# Scroll down to verify order reference is visible
- scrollUntilVisible:
    element:
      text: "Order ref:.*"
    direction: DOWN
    timeout: 5000

# ---- NAVIGATE BACK ----
# Tap the Stack header's back button (headerBackTitle: "Back" set in layout).
# Note: Maestro's `- back` command doesn't reliably pop Stack screens on
# iOS in Expo Go, so we tap the header button text directly.
- tapOn: "Back"

- extendedWaitUntil:
    visible:
      text: "My Orders"
    timeout: 10000

# ---- CLEANUP ----
# Already on Profile screen (where Sign Out lives)
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
