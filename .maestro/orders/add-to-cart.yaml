# ============================================================================
# ORDERS — ADD TO CART
#
# Tests the "Add to Cart" flow from the configurator review screen.
# After adding an item, the customer is navigated back to the Products tab.
# Then verifies the item appears in the Cart tab with correct details.
#
# WHY THIS TEST EXISTS:
# "Add to Cart" is the primary action on the review screen (not express
# checkout). It writes to the Zustand cart store and navigates away.
# This test verifies the full path: configurator → cart store → cart UI.
#
# FLOW:
# Login → Products → Two-Piece Suit → configure all steps → Review
# → "Add to Cart" → verify on Products tab → Cart tab → verify item
# appears with correct product name → cleanup (logout)
#
# PREREQUISITE:
# - Test user exists in Supabase Auth (cspritivi@gmail.com / test123456)
# - Seed data loaded (products + product_options + fabrics)
# ============================================================================
appId: com.apollo.tailor

---

# ---- AUTHENTICATE ----
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Home"
    timeout: 10000

# ---- NAVIGATE TO PRODUCTS TAB ----
- tapOn: "Products"

- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

# ---- CONFIGURE A PRODUCT (Two-Piece Suit) ----
- tapOn:
    text: "Two-Piece Suit.*"

# Step 0: Fabric
- extendedWaitUntil:
    visible:
      text: "Choose Fabric"
    timeout: 10000

- tapOn:
    text: "Black Wool Crepe.*"

- tapOn: "Next"

# Step 1: Lapel Style
- extendedWaitUntil:
    visible:
      text: "Choose Lapel Style"
    timeout: 5000

- tapOn:
    text: "Peak Lapel.*"

- tapOn: "Next"

# Step 2: Button Count
- extendedWaitUntil:
    visible:
      text: "Choose Button Count"
    timeout: 5000

- tapOn:
    text: "Two Button.*"

- tapOn: "Next"

# Step 3: Vent Style
- extendedWaitUntil:
    visible:
      text: "Choose Vent Style"
    timeout: 5000

- tapOn:
    text: "Single Vent.*"

- tapOn: "Next"

# Step 4: Lining Style
- extendedWaitUntil:
    visible:
      text: "Choose Lining Style"
    timeout: 5000

- tapOn:
    text: "Full Lining.*"

- tapOn: "Next"

# Step 5: Pocket Style
- extendedWaitUntil:
    visible:
      text: "Choose Pocket Style"
    timeout: 5000

- tapOn:
    text: "Welt Pocket.*"

- tapOn: "Next"

# ---- REVIEW STEP ----
- extendedWaitUntil:
    visible:
      text: "Review Your Configuration"
    timeout: 5000

# ---- ADD TO CART ----
# "Add to Cart" is the primary button on the review step.
# Uses accessibilityLabel "Add to cart" (lowercase "cart").
- tapOn: "Add to cart"

# After adding, the customer is navigated to the Products tab
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit.*"
    timeout: 10000

# ---- VERIFY CART ----
# Navigate to the Cart tab
- tapOn: "Cart"

# The cart should now show the item we just added
- extendedWaitUntil:
    visible:
      text: "Two-Piece Suit"
    timeout: 5000

# Verify fabric name appears on the cart item card
- assertVisible: "Black Wool Crepe"

# Verify option count is shown (5 option groups for Two-Piece Suit)
- assertVisible: "5 options selected"

# Verify "Place Order" checkout button exists
- assertVisible: "Place Order"

# ---- CLEANUP ----
# Remove the item from cart to leave clean state
- tapOn:
    text: "Remove Two-Piece Suit from cart"

# Verify cart is now empty
- extendedWaitUntil:
    visible:
      text: "Your cart is empty"
    timeout: 5000

# Navigate home and log out
- tapOn: "Home"
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
