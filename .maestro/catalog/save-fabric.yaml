# ============================================================================
# FABRIC CATALOG — SAVE/UNSAVE FABRIC FLOW
#
# Tests saving a fabric from the catalog grid card and then unsaving it.
# Verifies the toggle button changes state (+ → ✓ → +).
#
# WHY TEST SAVE/UNSAVE:
# This exercises the full optimistic update pipeline: useSaveFabric and
# useUnsaveFabric mutations, React Query cache invalidation, and the
# FabricCard's animated toggle button. If optimistic updates break,
# the button state desyncs from the server.
#
# HOW THE SAVE BUTTON IS IDENTIFIED:
# Each FabricCard's save Pressable has accessibilityLabel "Save fabric"
# (when unsaved) or "Unsave fabric" (when saved). Since multiple cards
# have these labels, we use the first match — which is fine as long as
# we verify the state change.
#
# PREREQUISITE:
# - Test user exists in Supabase Auth (cspritivi@gmail.com / test123456)
# - Seed data loaded (20 fabrics)
# - The test fabric is NOT already saved (test isolation — previous tests
#   must clean up by unsaving)
# ============================================================================
appId: host.exp.Exponent

---

# Authenticate
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      text: "You are logged in!"
    timeout: 10000

# Navigate to Fabrics tab
- tapOn: "Fabrics"

# Wait for catalog to load
- extendedWaitUntil:
    visible:
      text: "Black Wool Crepe.*"
    timeout: 10000

# Tap the first "Save fabric" button on a card.
# accessibilityLabel is "Save fabric" when the fabric is not saved.
- tapOn: "Save fabric"

# After saving, the button's accessibilityLabel should change to "Unsave fabric".
# Wait a moment for the optimistic update to take effect.
- extendedWaitUntil:
    visible:
      text: "Unsave fabric"
    timeout: 5000

# Now unsave it to restore the original state.
- tapOn: "Unsave fabric"

# Verify it reverts back to "Save fabric"
- extendedWaitUntil:
    visible:
      text: "Save fabric"
    timeout: 5000

# ---- CLEANUP: navigate home and log out so the next test starts fresh ----
- tapOn: "Home"
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
