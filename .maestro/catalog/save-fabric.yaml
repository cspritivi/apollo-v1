# ============================================================================
# FABRIC CATALOG — SAVE/UNSAVE FABRIC FROM CARD
#
# Tests saving a fabric by tapping the +/✓ button on a FabricCard in the
# catalog grid, then unsaving it to verify the toggle works both ways.
#
# WHY testID INSTEAD OF accessibilityLabel:
# FabricCard's outer Pressable has accessible={true} (React Native default),
# which groups all children into one atomic accessible node on iOS. This
# swallows the inner save button's accessibilityLabel — Maestro can't find
# "Save fabric" as a standalone element. testID bypasses this grouping
# entirely, so Maestro's id: selector can always find the button.
#
# WHY THE testID CHANGES WITH STATE:
# The save button's testID is "save-fabric-button" when unsaved and
# "unsave-fabric-button" when saved. This lets Maestro verify the state
# change by checking which testID is now visible, without needing to
# inspect the button's visual content.
#
# PREREQUISITE:
# - Test user exists in Supabase Auth (cspritivi@gmail.com / test123456)
# - Seed data loaded (20 fabrics)
# - The first visible fabric is NOT already saved (test isolation)
# ============================================================================
appId: host.exp.Exponent

---

# Authenticate
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      text: "You are logged in!"
    timeout: 10000

# Navigate to Fabrics tab
- tapOn: "Fabrics"

# Wait for catalog to load
- extendedWaitUntil:
    visible:
      text: "Black Wool Crepe.*"
    timeout: 10000

# Tap the save button on the first unsaved fabric card.
# Uses id: selector (testID) because accessibilityLabel is swallowed
# by iOS accessibility grouping on the parent Pressable.
- tapOn:
    id: "save-fabric-button"

# After saving, the testID changes to "unsave-fabric-button".
# Wait for the optimistic update to take effect.
- extendedWaitUntil:
    visible:
      id: "unsave-fabric-button"
    timeout: 5000

# Unsave it to restore clean state
- tapOn:
    id: "unsave-fabric-button"

# Verify it reverts — the testID changes back to "save-fabric-button"
- extendedWaitUntil:
    visible:
      id: "save-fabric-button"
    timeout: 5000

# ---- CLEANUP: navigate home and log out so the next test starts fresh ----
- tapOn: "Home"
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
