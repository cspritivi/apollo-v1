# ============================================================================
# FABRIC CATALOG — PULL TO REFRESH
#
# Tests that pulling down on the fabric list triggers a refresh without
# losing the existing data. This validates the React Query refetch
# integration with FlatList's onRefresh prop.
#
# WHY TEST PULL-TO-REFRESH:
# It's a common interaction that exercises the React Query cache invalidation
# path. If the refetch breaks (e.g., returns an error), the user would see
# an empty list or a crash. This test catches regressions.
#
# PREREQUISITE:
# - Test user exists in Supabase Auth
# - Seed data loaded
# ============================================================================
appId: com.apollo.tailor

---

# Authenticate
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      text: "You are logged in!"
    timeout: 10000

# Navigate to Fabrics tab
- tapOn: "Fabrics"

# Wait for initial load (regex matches card accessibilityLabel)
- extendedWaitUntil:
    visible:
      text: "Black Wool Crepe.*"
    timeout: 10000

# Pull to refresh — Maestro's swipe simulates the gesture
- swipe:
    direction: DOWN
    duration: 1000

# After refresh, data should still be visible (not lost during refetch)
- extendedWaitUntil:
    visible:
      text: "Black Wool Crepe.*"
    timeout: 10000

# Confirm a second fabric is still present (data wasn't cleared during refresh)
- assertVisible:
    text: "Camel Wool Twill.*"

# ---- CLEANUP: navigate home and log out so the next test starts fresh ----
- tapOn: "Home"
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
