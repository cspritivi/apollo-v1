# ============================================================================
# FABRIC CATALOG — DETAIL MODAL FLOW
#
# Tests that tapping a fabric card opens the detail modal with full
# information, and that the modal can be dismissed.
#
# WHY TEST THE MODAL SEPARATELY:
# The browse test confirms the grid renders. This test confirms the
# card → modal interaction works, which exercises a different code path
# (selectedFabric state, Modal component, detail data rendering).
#
# PREREQUISITE:
# - Test user exists in Supabase Auth
# - Seed data loaded (20 fabrics)
# ============================================================================
appId: com.apollo.tailor

---

# Authenticate
- assertVisible: "Welcome Back"
- tapOn: "Email"
- inputText: "cspritivi@gmail.com"
- tapOn: "Password"
- inputText: "test123456"
- tapOn: "Sign In"

- tapOn:
    text: "Not Now"
    optional: true

- extendedWaitUntil:
    visible:
      text: "You are logged in!"
    timeout: 10000

# Navigate to Fabrics tab
- tapOn: "Fabrics"

# Wait for catalog to load (regex matches card accessibilityLabel)
- extendedWaitUntil:
    visible:
      text: "Black Wool Crepe.*"
    timeout: 10000

# Tap on a fabric card to open the detail modal
- tapOn:
    text: "Black Wool Crepe.*"

# The detail modal should show the detail header
- extendedWaitUntil:
    visible:
      text: "Fabric Details"
    timeout: 5000

# Verify detail content — inside the modal, Text elements are NOT grouped
# by an accessibilityLabel, so exact text matching works here.
- assertVisible: "Black Wool Crepe"
- assertVisible: "In Stock"

# Close the modal via accessibility label on the close button
- tapOn: "Close fabric details"

# After closing, we should be back on the catalog grid
- extendedWaitUntil:
    visible:
      text: "Black Wool Crepe.*"
    timeout: 5000

# ---- CLEANUP: navigate home and log out so the next test starts fresh ----
- tapOn: "Home"
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 10000
