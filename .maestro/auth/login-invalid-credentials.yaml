# ============================================================================
# LOGIN — INVALID CREDENTIALS
#
# Tests that the form shows an error when the user enters wrong credentials.
# This validates that Supabase auth errors propagate correctly through the
# 3-layer pattern: api.ts throws → useSignIn's onError fires → Alert shown.
# ============================================================================
appId: com.apollo.tailor

---

- assertVisible: "Welcome Back"

# Enter credentials that don't match any user in Supabase
- tapOn: "Email"
- inputText: "wrong@example.com"
- tapOn: "Password"
- inputText: "wrongpassword"

# Submit
- tapOn: "Sign In"

# Supabase returns "Invalid login credentials" which our api.ts converts
# to an error that the hook's onError handler displays via Alert.alert.
- extendedWaitUntil:
    visible:
      text: "Login Failed"
    timeout: 10000

# Dismiss and verify we're still on the login screen (no redirect)
- tapOn: "OK"
- assertVisible: "Welcome Back"
